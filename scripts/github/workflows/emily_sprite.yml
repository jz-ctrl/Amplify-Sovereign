name: 'EMILY Working Sprite'
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour automatically
  workflow_dispatch: # Allows you to start it manually

jobs:
  run-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Human Sim Audit
        run: python scripts/emily_human_sim.py
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
